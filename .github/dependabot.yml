version: 2
updates:
  # Python dependencies in the reference ComfyUI implementation.
  - package-ecosystem: pip
    directory: /comfyui-loovie
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      security:
        applies-to: security-updates
        patterns: ["*"]
      minor-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  # Python dependencies in the framework-agnostic FastAPI example.
  - package-ecosystem: pip
    directory: /examples/minimal-server
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    ignore:
      # schemathesis 4.x renamed several CLI args we use in
      # .github/workflows/contract.yml (--base-url -> --url,
      # --hypothesis-max-examples -> --max-examples, removed
      # --experimental=openapi-3.1, etc). Pin to <4 until the CLI
      # invocation is migrated in a dedicated PR.
      - dependency-name: schemathesis
        versions: [">=4"]
    groups:
      security:
        applies-to: security-updates
        patterns: ["*"]
      minor-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  # Container base image.
  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3

  # GitHub Actions, pinned by SHA. Dependabot updates the SHAs.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      # Bundle minor + patch SHA bumps into one PR. Majors get their
      # own PR each so they can be reviewed in isolation, since major
      # bumps on common actions (checkout, setup-python, codeql-action,
      # docker/*) periodically ship breaking behaviour changes.
      actions:
        applies-to: version-updates
        update-types: [minor, patch]
        patterns: ["*"]
