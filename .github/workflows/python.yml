name: python
on:
  pull_request:
    paths:
      - 'comfyui-loovie/**'
      - 'examples/minimal-server/**'
      - '.github/workflows/python.yml'
  push:
    branches: [main]
    paths:
      - 'comfyui-loovie/**'
      - 'examples/minimal-server/**'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  comfyui-loovie:
    name: comfyui-loovie (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12']
    defaults:
      run:
        working-directory: comfyui-loovie
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@v4.2.0
        with:
          enable-cache: true
          cache-dependency-glob: 'comfyui-loovie/uv.lock'

      - name: Set Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Sync dependencies
        run: uv sync --all-extras --frozen

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Mypy (strict)
        # ComfyUI internals are not installed in CI (server, folder_paths,
        # comfy.cli_args, torch) so we use --ignore-missing-imports to focus
        # on our own type correctness. Strict mode is otherwise enforced.
        run: uv run mypy --ignore-missing-imports src/comfyui_loovie

      - name: Pytest
        run: uv run pytest

      - name: Regenerate requirements.txt and assert it matches pyproject.toml
        # Pin --python-version to the lowest supported python (3.10) so the
        # compile output is identical across all matrix slots. Without the
        # pin, the 3.10 runner adds backport packages (async-timeout,
        # exceptiongroup) that 3.11+ get from the stdlib, and the committed
        # file can never match both.
        run: |
          uv pip compile pyproject.toml -o requirements.txt --no-emit-index-url --no-emit-find-links --quiet --python-version 3.10
          # Fail CI if the committed requirements.txt has drifted from
          # pyproject.toml. ComfyUI-Manager reads requirements.txt, so
          # silent drift means users get a different pin set than `uv sync`
          # produced.
          git diff --exit-code requirements.txt

  minimal-server:
    name: examples/minimal-server (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12']
    defaults:
      run:
        working-directory: examples/minimal-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@v4.2.0
        with:
          enable-cache: true

      - name: Set Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Create venv + sync dependencies
        # Ubuntu 24.04 system Python is PEP-668 protected ("externally managed").
        # A uv-managed venv sidesteps that and is what `uv run` expects anyway.
        run: |
          uv venv --python ${{ matrix.python }}
          uv pip install -e '.[dev]'

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Pytest
        run: uv run pytest -v
