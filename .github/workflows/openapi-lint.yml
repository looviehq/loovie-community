name: openapi-lint
on:
  pull_request:
    paths:
      - 'openapi/**'
      - '.github/workflows/openapi-lint.yml'
  push:
    branches: [main]
    paths:
      - 'openapi/**'

permissions:
  contents: read

jobs:
  lint:
    name: Redocly lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '20'

      - name: Run Redocly lint
        run: npx -y @redocly/cli@latest lint openapi/loovie-server.openapi.yaml --extends=recommended-strict
