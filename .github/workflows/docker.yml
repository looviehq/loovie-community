name: docker

on:
  pull_request:
    paths:
      - 'docker/**'
      - 'comfyui-loovie/**'
      - 'scripts/new-token.sh'
      - '.github/workflows/docker.yml'
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'comfyui-loovie/**'
      - 'scripts/new-token.sh'
    tags: ['v*']

  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------------
  # Cheap static checks first. The build + cosign signing + syft SBOM + Trivy
  # scan run only on `v*` tag pushes (or workflow_dispatch). We deliberately
  # do NOT build the CUDA image on every PR (5 GB+, several minutes).
  # ------------------------------------------------------------------------

  hadolint:
    name: Hadolint (Dockerfile lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Hadolint
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: docker/Dockerfile
          ignore: DL3008,DL3013,DL3059
          # DL3008: apt-get without explicit versions, defensible for a CUDA base
          # that pins indirectly via the digest. DL3013: same for pip.

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        env:
          SHELLCHECK_OPTS: -e SC1091
        with:
          scandir: '.'
          additional_files: 'docker/entrypoint.sh docker/download_models.sh scripts/new-token.sh'
          severity: warning

  validate-configs:
    name: Validate template / config / manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install jq + Python YAML
        run: |
          sudo apt-get update -qq
          sudo apt-get install --no-install-recommends -y -qq jq python3-yaml

      - name: Validate runpod-template.json
        run: |
          jq empty docker/runpod-template.json
          for key in name containerImage ports env; do
            jq -e --arg k "$key" 'has($k)' docker/runpod-template.json >/dev/null \
              || { echo "missing required key: $key"; exit 1; }
          done
          echo "runpod-template.json OK"

      - name: Validate extra_model_paths.yaml
        run: |
          python3 -c "import yaml,sys; d=yaml.safe_load(open('docker/extra_model_paths.yaml')); assert 'loovie' in d and 'base_path' in d['loovie']; print('extra_model_paths.yaml OK')"

      - name: Validate models.manifest
        run: |
          bad=0
          while IFS=$'\t' read -r kind repo hf_path local_name target_subdir; do
            case "$kind" in ''|\#*) continue ;; esac
            if [ -z "$target_subdir" ]; then
              target_subdir="$local_name"
              local_name="$(basename "$hf_path")"
            fi
            if [ -z "$repo" ] || [ -z "$hf_path" ] || [ -z "$local_name" ] || [ -z "$target_subdir" ]; then
              echo "Bad row (need 5 fields, or 4 legacy fields): kind=$kind repo=$repo hf_path=$hf_path local_name=$local_name target_subdir=$target_subdir"
              bad=1
              continue
            fi
            if [ "$kind" != "image" ] && [ "$kind" != "video" ]; then
              echo "Bad kind: $kind (must be image or video)"
              bad=1
            fi
          done < docker/models.manifest
          if [ "$bad" = "1" ]; then exit 1; fi
          echo "models.manifest OK"

  build-and-push:
    name: Build, sign, scan, SBOM
    runs-on: ubuntu-latest
    needs: [hadolint, shellcheck, validate-configs]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/loovie-server
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata + tags
        id: meta
        uses: docker/metadata-action@8e5442c4ef9f78752691e2d8f8d19755c6f78e81 # v5.5.1
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=beta,enable=${{ contains(github.ref_name, '-beta') }}
            type=sha,format=short
          # Deliberately no `latest` tag during beta. For ML inference
          # images, :latest causes silent breakage. [D24]

      - name: Build + push (amd64-only)
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (keyless OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS:   ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "$TAGS"

      - name: Generate SBOM (syft)
        uses: anchore/sbom-action@fc46e51fd3cb168ffb36c6d1915723c47db58abb # v0.17.7
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          upload-release-assets: true

      - name: Attach SBOM as cosign attestation
        env:
          IMG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "$IMG"

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'
          format: sarif
          output: trivy.sarif

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          sarif_file: trivy.sarif
          category: trivy-container

      - name: Step summary
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS:   ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "## Container build"
            echo "- digest: \`${DIGEST}\`"
            echo ""
            echo "### Tags"
            while IFS= read -r tag; do
              [ -n "$tag" ] || continue
              echo "- ${tag}"
            done <<< "${TAGS}"
            echo ""
            echo "Signed via cosign (keyless OIDC). SBOM (spdx-json) attached as a cosign attestation."
          } >> "$GITHUB_STEP_SUMMARY"
