name: gh-pages

on:
  push:
    branches: [main]
    paths:
      - 'openapi/**'
      - '.github/workflows/gh-pages.yml'
  workflow_dispatch:

permissions:
  contents: read

# Cancel an in-flight Pages deploy if another push comes in.
concurrency:
  group: gh-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  render-and-deploy:
    name: Render OpenAPI -> gh-pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Render with Redocly
        run: |
          mkdir -p site/spec
          npx -y @redocly/cli@latest build-docs \
            openapi/loovie-server.openapi.yaml \
            -o site/spec/index.html
          # Drop a small landing index that links into the spec, so
          # https://looviehq.github.io/loovie-community/ doesn't 404.
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Loovie Community</title>
            <meta http-equiv="refresh" content="0; url=./spec/">
          </head>
          <body><a href="./spec/">Loovie BYO server contract</a></body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
