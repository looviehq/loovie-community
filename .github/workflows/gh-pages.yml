name: gh-pages

on:
  push:
    branches: [main]
    paths:
      - 'openapi/**'
      - '.github/workflows/gh-pages.yml'
  workflow_dispatch:

permissions:
  contents: read

# Cancel an in-flight Pages deploy if another push comes in.
concurrency:
  group: gh-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  render-and-deploy:
    name: Render OpenAPI -> gh-pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'

      - name: Render with Redocly
        run: |
          mkdir -p site/spec
          npx -y @redocly/cli@latest build-docs \
            openapi/loovie-server.openapi.yaml \
            -o site/spec/index.html
          # Drop a small landing index that links into the spec, so
          # https://looviehq.github.io/loovie-community/ doesn't 404.
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Loovie Community</title>
            <meta http-equiv="refresh" content="0; url=./spec/">
          </head>
          <body><a href="./spec/">Loovie BYO server contract</a></body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
