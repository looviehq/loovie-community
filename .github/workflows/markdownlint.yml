name: markdownlint
on:
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - '.github/workflows/markdownlint.yml'
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.markdownlint.json'

permissions:
  contents: read

jobs:
  markdownlint:
    name: Lint markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'
          config: '.markdownlint.json'
