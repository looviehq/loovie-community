name: markdownlint
on:
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/markdownlint.yml'
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - '.markdownlint-cli2.jsonc'

permissions:
  contents: read

jobs:
  markdownlint:
    name: Lint markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Run markdownlint-cli2
        # No globs / config passed: the action picks them up from
        # .markdownlint-cli2.jsonc at repo root (which also carries the
        # ignores list, e.g. for release-please's autogen CHANGELOG.md).
        uses: DavidAnson/markdownlint-cli2-action@v23
