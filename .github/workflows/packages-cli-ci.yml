name: packages-cli-ci

# PR + push validation for the @loovie/mcp installer CLI in packages/cli.
# Verifies the package type-checks, tests pass, builds cleanly, and packs
# into a valid npm tarball with the expected files / bin entry. Catches
# .npmignore mistakes, missing dist files, and broken bin shebangs before
# they reach a `cli-v*` release tag.

on:
  pull_request:
    paths:
      - 'packages/cli/**'
      - '.github/workflows/packages-cli-ci.yml'
  push:
    branches: [main]
    paths:
      - 'packages/cli/**'
      - '.github/workflows/packages-cli-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Typecheck, test, build, pack
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v3.0.0
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: packages/cli/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        # packages/cli has no `typecheck` script, so call tsc directly.
        # Switch to `pnpm typecheck` if/when that script is added.
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Pack
        # Verifies the published tarball is well-formed: catches missing
        # files in `files`, a broken `bin` entry, or .npmignore mistakes
        # that would otherwise only surface after `npm publish`.
        run: pnpm pack --pack-destination /tmp

      - name: Inspect tarball contents
        run: tar -tzf /tmp/loovie-mcp-*.tgz | head -50
