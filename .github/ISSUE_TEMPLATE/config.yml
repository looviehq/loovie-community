blank_issues_enabled: false
contact_links:
  - name: BYO setup or usage help
    url: https://github.com/looviehq/loovie-community/discussions
    about: For "how do I install ComfyUI" / configuration / hosting questions, please use GitHub Discussions. A community Discord opens with v0.1.0-beta (invite in the README). GitHub Issues are for reproducible bugs.
  - name: Security vulnerability
    url: https://github.com/looviehq/loovie-community/security/advisories/new
    about: Report a vulnerability privately. Please do not open a public issue for security problems.
  - name: Loovie app (iOS) support
    url: https://loovie.app/support
    about: For issues with the mainline Loovie iOS or Android app — this repo only covers the BYO server contract and reference implementations.
